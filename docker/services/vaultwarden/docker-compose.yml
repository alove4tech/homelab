version: '3.8'

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped

    # Resource limits for N100 mini PC
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

    environment:
      # Domain (update with your actual domain)
      DOMAIN: https://vaultwarden.yourdomain.com

      # Database settings (SQLite default, change to PostgreSQL if needed)
      DATABASE_URL: /data/db.sqlite3

      # WebSocket settings
      WEBSOCKET_ENABLED: 'true'
      WEBSOCKET_ADDRESS: 0.0.0.0
      WEBSOCKET_PORT: 3012

      # Admin panel (DISABLE in production after setup!)
      ADMIN_TOKEN: 'change_this_to_a_secure_random_string'
      ADMIN_RATELIMIT_SECONDS: 60
      ADMIN_RATELIMIT_MAX_BURST: 10

      # User registration
      SIGNUPS_ALLOWED: 'true'  # Disable after creating your account
      SIGNUPS_VERIFY_RESEND_TIME: 3600
      SIGNUPS_VERIFY_RESEND_LIMIT: 5

      # Email (configure for password reset and invites)
      # SMTP_HOST: smtp.gmail.com
      # SMTP_FROM: vaultwarden@yourdomain.com
      # SMTP_PORT: 587
      # SMTP_SECURITY: starttls
      # SMTP_USERNAME: your-email@gmail.com
      # SMTP_PASSWORD: your-app-password

      # Attachments
      ATTACHMENTS_SIZE_LIMIT: 104857600  # 100MB in bytes
      ATTACHMENTS_FOLDER: /data/attachments

      # Icon service
      ICON_DOWNLOAD_TIMEOUT: 10

      # Logging
      LOG_LEVEL: info
      EXTENDED_LOGGING: 'true'
      LOG_TIMESTAMP_FORMAT: "%Y-%m-%d %H:%M:%S.%3f"

      # Performance tuning for N100
      WEBSOCKET_MAX_PAYLOAD_MB: 10

      # Security
      ROCKET_ADDRESS: 0.0.0.0
      ROCKET_PORT: 80
      ROCKET_WORKERS: 2  # Adjust based on N100 cores

    volumes:
      - vaultwarden-data:/data

    ports:
      - "80:80"      # HTTP (use reverse proxy with SSL in production)
      - "3012:3012"  # WebSocket

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - vaultwarden-net

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  vaultwarden-data:
    driver: local

networks:
  vaultwarden-net:
    driver: bridge
