services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped

    # Resource limits for N100 mini PC
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

    env_file:
      - .env

    # Optional: Override specific env vars directly in compose
    # environment:
    #   - ROCKET_WORKERS=2

    volumes:
      - vaultwarden-data:/data

    ports:
      - "80:80"      # HTTP (use reverse proxy with SSL in production)
      - "3012:3012"  # WebSocket

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - vaultwarden-net

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  vaultwarden-data:
    driver: local

networks:
  vaultwarden-net:
    driver: bridge
