services:
  nexterm:
    image: germannewsmaker/nexterm:latest
    container_name: nexterm
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M

    ports:
      - "${NEXTERM_PORT:-6989}:6989"

    volumes:
      - nexterm-data:/app/data

    environment:
      LOG_LEVEL: ${NEXTERM_LOG_LEVEL:-info}
      ENCRYPTION_KEY: "${NEXTERM_ENCRYPTION_KEY:?Set NEXTERM_ENCRYPTION_KEY in .env; generate one with: openssl rand -hex 32}"

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6989 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - nexterm-net

    security_opt:
      - no-new-privileges:true

volumes:
  nexterm-data:

networks:
  nexterm-net:
    driver: bridge
